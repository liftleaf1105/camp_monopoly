services:
  monopoly-mongodb:
    image: mongo
    expose:
      - "27017"
    networks:
      - monopoly-mongodb
  monopoly-web:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "2022"
    depends_on:
      - monopoly-mongodb
    environment:
      MONGO_URL: mongodb://monopoly-mongodb/monopoly
      WEB_DOMAIN: eecamp-monopoly.ntuee.org
    tty: true
    stdin_open: true
    networks:
      - monopoly-web

networks:
  monopoly-mongodb:
    name: eeinfo
    external: true
  monopoly-web:
    name: eeinfo
    external: true
